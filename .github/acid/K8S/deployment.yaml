---
apiVersion: apps/v1
kind: Deployment
metadata:
    annotations:
       deployment.kubernetes.io/revision: "1"
    creationtimestamp: null
    generation: 1
    labels:
      app.kubernetes.io/name: nya-master-int
      app.kubernetes.io/component: master-int
    name: nya-master-int-deployment
spec:
   replicas: 1
   selector:
      matchLabels:
         app.kubernetes.io/name: nya-master-int
         app.kubernetes.io/component: master-int
   strategy:
      rollingUpdate:
         maxSurge: 1
         maxUnavailable: 0
   template:
     metadata:
         labels:
           app.kubernetes.io/name: nya-master-prd
           app.kubernetes.io/component: master-prd
           log-collector: maas
     spec:
      containers:
        - image: harbour.en.india.cloud.wipro/nya-a524-prod/nya-master-prd:26.1.10
          volumeMounts:
            - name: volume-logs
              mountPath:
                 /usr/app/logs
          imagePullPolicy: Always
          name: nya-master-prd-cn
          readinessProbe:
            initialDelaySeconds: 400
            periodSeconds: 30
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 20
            httpGet:
              path: actuator/health
              port: 8080
          livenessProbe:
            httpGet:
              path: actuator/health/liveness
              port: 8080
              schema: HTTP
            initialDelaySeconds: 700
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
          envFrom:
            - configMapRef:
                name: nya-master-prod-cm
            - secretRef:
                name: nya-master-prod-secret
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            limits:
              cpu: 200m
              memory: 6Gi
            requests:
              cpu: 100m
              memory: 6Gi

     dnsPolicy: ClusterFirst
     restartPolicy: Always
     securityContext: { }
     volumes:
       - name: sgmonitoring-filebeat-config-vloume
         secret:
           secretName: nya-master-prod-sgmonitoring-filebeat-secret
       - name: volume-logs
         emptyDir: { }
