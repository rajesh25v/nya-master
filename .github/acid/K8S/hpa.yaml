## Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    name: hpa-nya-master-prod
spec:
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: nya-master-prod
    minReplicas: 2
    maxReplicas: 10
    metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80